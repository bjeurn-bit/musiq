<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
</head>
<body>
    
    <audio id="audio">
        <source src="sound.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    
    <button style="background-color: #04AA6D; /* Green background */
border: none; /* Remove default border */
color: white; /* White text */
padding: 14px 28px; /* Space inside button */
text-align: center;
font-size: 16px;
border-radius: 8px; /* Rounded corners */
cursor: pointer; /* Pointer on hover */
transition: background-color 0.3s, transform 0.2s; /* Smooth effects */" onclick="document.getElementById('audio').play()">Play</button>
</body>
</html>
